name: OptionsView Alerts SAFE

on:
  workflow_dispatch:

  schedule:
    - cron: "0 13 * * 1-5"
    - cron: "0 16 * * 1-5"
    - cron: "0 19 * * 1-5"

jobs:
  run-alerts:

    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      TICKERS: "MCD,PEP,PG,KO,JNJ,WMT,COST,HD,LOW,TGT,SBUX,MDLZ,CMCSA,MSFT,AAPL,GOOGL,META,AMZN,NVDA,AVGO,ADBE,CRM,JPM,MA,V,BLK,SCHW,SPY,QQQ,IWM,XLP,XLV,XLF"

      MIN_SCORE: "60"
      MAX_ALERTS: "10"

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy ta requests

      - name: Run alerts engine
        run: python alerts_engine.py
